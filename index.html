<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스마트팜 시뮬레이터</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 15px;
  border-radius: 10px;
  display: inline-block;
  width: 150px;
}

button {
  padding: 20px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  width: 220px;
}

.on { background: #22c55e; }
.off { background: #ef4444; }

/* 💧 물 애니메이션 */
.water {
  width: 20px;
  height: 0;
  background: skyblue;
  border-radius: 5px;
  transition: height 0.5s;
}

/* 💡 전구 */
.bulb {
  font-size: 40px;
  transition: 0.3s;
}

.bulb.on {
  color: yellow;
  text-shadow: 0 0 20px yellow;
}

.bulb.off {
  color: gray;
}

canvas {
  background: white;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🌱 스마트팜 제어 시스템</h1>

<div class="card">
  <h3>온도</h3>
  <p id="temp">25°C</p>
  <input type="range" min="10" max="40" value="25" id="tempSlider">
</div>

<div class="card">
  <h3>습도</h3>
  <p id="humidity">65%</p>
</div>

<div class="card">
  <h3>CO₂ 농도</h3>
  <p id="co2">800 ppm</p>
</div>

<div class="card">
  <h3>빛 파장</h3>
  <p id="light">550 nm</p>
</div>

<div class="card">
  <h3>EC</h3>
  <p id="nutrient">1.5</p>
</div>

<div class="card">
  <h3>빛 상태</h3>
  <div id="bulb" class="bulb off">🔌</div>
</div>

<div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0;">
  <button id="waterBtn" class="off">💧 물 펌프 OFF</button>
  <div id="waterAnim" class="water"></div>
 
  <button id="lightBtn" class="off">💡 조명 OFF</button>
</div>

<h2>📊 CO₂ & 습도</h2>
<canvas id="chart" width="600" height="300"></canvas>

<script>
// 기본 값
let temp = 25;
let co2 = 800;
let humidity = 65;

// 온도 조절
document.getElementById("tempSlider").addEventListener("input", (e) => {
  temp = e.target.value;
  document.getElementById("temp").innerText = temp + "°C";
});

// 버튼 상태
let waterOn = false;
let lightOn = false;

const waterAnim = document.getElementById("waterAnim");
const bulb = document.getElementById("bulb");

// 💧 물 버튼
document.getElementById("waterBtn").onclick = function() {
  waterOn = !waterOn;

  this.innerText = waterOn ? "💧 물 펌프 ON" : "💧 물 펌프 OFF";
  this.className = waterOn ? "on" : "off";

  // 애니메이션
  waterAnim.style.height = waterOn ? "60px" : "0px";
};

// 💡 조명 버튼
document.getElementById("lightBtn").onclick = function() {
  lightOn = !lightOn;

  this.innerText = lightOn ? "💡 조명 ON" : "💡 조명 OFF";
  this.className = lightOn ? "on" : "off";

  // 전구 효과
  bulb.className = lightOn ? "bulb on" : "bulb off";
  bulb.innerText = lightOn ? "💡" : "🔌";
};

// 그래프
const ctx = document.getElementById('chart').getContext('2d');

let labels = [];
let co2Data = [];
let humidityData = [];

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [
      {
        label: 'CO₂ ppm',
        data: co2Data,
        borderColor: 'red'
      },
      {
        label: '습도 %',
        data: humidityData,
        borderColor: 'blue'
      }
    ]
  }
});

// 자동 변화
setInterval(() => {
  co2 += Math.floor(Math.random() * 10 - 5);
  humidity += Math.floor(Math.random() * 4 - 2);

  document.getElementById("co2").innerText = co2 + " ppm";
  document.getElementById("humidity").innerText = humidity + "%";

  if(labels.length > 20) {
    labels.shift();
    co2Data.shift();
    humidityData.shift();
  }

  labels.push('');
  co2Data.push(co2);
  humidityData.push(humidity);

  chart.update();

}, 2000);

</script>

</body>
</html>
