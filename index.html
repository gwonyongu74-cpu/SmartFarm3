<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스마트팜 PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
.card { background:#1e293b; padding:15px; margin:10px; border-radius:10px; display:inline-block; width:160px; }
button { padding:10px; margin:5px; border:none; border-radius:10px; cursor:pointer; }
.on { background:#22c55e; }
.off { background:#ef4444; }
.bulb { font-size:40px; }
canvas { background:white; border-radius:10px; margin-top:20px; }

#sensorPanel, #controlPanel {
  display:flex; 
  justify-content:center; 
  flex-wrap:wrap;
  margin-bottom:20px;
}

#controlPanel {
  margin-top:30px;
}
</style>
</head>

<body>

<h1>🌱 스마트팜 PRO 시스템</h1>

<h2 id="modeDisplay" style="font-size:40px; margin:10px;">🟢 AUTO MODE</h2>

<!-- 센서 패널 (위) -->
<div id="sensorPanel">
  <div class="card"><h3>온도</h3><p id="temp">25</p></div>
  <div class="card"><h3>습도</h3><p id="humidity">65</p></div>
  <div class="card"><h3>CO₂</h3><p id="co2">800</p></div>
</div>

<!-- 제어 패널 (아래) -->
<div id="controlPanel">
  <!-- 목표값 -->
  <div class="card">
    <h3>목표 온도</h3>
    <input type="number" id="targetTemp" value="24">
  </div>
  <div class="card">
    <h3>목표 습도</h3>
    <input type="number" id="targetHum" value="70">
  </div>

  <!-- 팬 -->
  <div class="card">
    <h3>팬 속도</h3>
    <input type="range" min="0" max="3" id="fan">
    <p id="fanText">0</p>
  </div>

  <!-- 조명 -->
  <div class="card">
    <h3>밝기</h3>
    <input type="range" min="0" max="100" id="light">
    <div id="bulb">🔌</div>
  </div>

  <!-- 물 공급량 -->
  <div class="card">
    <h3>💧 물 공급</h3>
    <p id="waterText">0 L/h</p>
    <button id="waterBtn" class="off">물 펌프 OFF</button>
    <input type="range" min="0" max="100" id="water" style="width:140px;">
  </div>
</div>

<br>
<button id="modeBtn">모드 변경</button>

<h2>📊 그래프</h2>
<canvas id="chart"></canvas>

<script>
// ----------------- 상태값 -----------------
let temp=25, humidity=65, co2=800;
let mode="AUTO";

// AUTO/MANUAL UI
const modeDisplay = document.getElementById("modeDisplay");
const modeBtn = document.getElementById("modeBtn");

function updateModeUI(){
  if(mode==="AUTO"){
    modeDisplay.innerText="🟢 AUTO MODE";
    modeDisplay.style.color="#22c55e";
  } else {
    modeDisplay.innerText="🔴 MANUAL MODE";
    modeDisplay.style.color="#ef4444";
  }
}
updateModeUI();

modeBtn.onclick = () => {
  mode = (mode==="AUTO") ? "MANUAL" : "AUTO";
  updateModeUI();
};

// ----------------- DOM 요소 -----------------
const tempEl = document.getElementById("temp");
const humEl = document.getElementById("humidity");
const co2El = document.getElementById("co2");

const fanSlider = document.getElementById("fan");
const fanText = document.getElementById("fanText");
fanSlider.oninput = () => fanText.innerText = fanSlider.value;

const lightSlider = document.getElementById("light");
const bulb = document.getElementById("bulb");

const waterSlider = document.getElementById("water");
const waterText = document.getElementById("waterText");
const waterBtn = document.getElementById("waterBtn");
let waterOn=false;
let waterFlow=0;

// 물 버튼
waterBtn.onclick = () => {
  waterOn = !waterOn;
  waterBtn.className = waterOn ? "on" : "off";
  waterBtn.innerText = waterOn ? "물 펌프 ON" : "물 펌프 OFF";
};

// ----------------- 그래프 -----------------
const ctx = document.getElementById("chart");
let labels=[], co2Data=[], humData=[];

const chart = new Chart(ctx,{
  type:'line',
  data:{
    labels:labels,
    datasets:[
      {label:"CO2", data:co2Data, borderColor:"red", yAxisID:'y1'},
      {label:"습도", data:humData, borderColor:"blue", yAxisID:'y2'}
    ]
  },
  options:{
    animation:false,
    scales:{
      y1:{position:'left', min:700, max:900},
      y2:{position:'right', min:50, max:80, grid:{drawOnChartArea:false}}
    }
  }
});

// ----------------- AUTO/수동 제어 -----------------
setInterval(()=>{
  let targetTemp=+document.getElementById("targetTemp").value;
  let targetHum=+document.getElementById("targetHum").value;

  let fan=+fanSlider.value;
  let light=+lightSlider.value;
  let water=+waterSlider.value;

  // AUTO 모드
  if(mode==="AUTO"){
    // 온도 기반 팬 자동 조절
    let tempError = targetTemp - temp;
    fan = Math.min(3, Math.max(0, Math.round(Math.abs(tempError)/2)));
    
    // 습도 기반 물 자동 조절
    let humError = targetHum - humidity;
    waterFlow = Math.max(0, humError * 2); // L/h 단위
    waterOn = waterFlow>0;

    // 낮/밤 조명
    let h = new Date().getHours();
    light = (h>6 && h<18)?80:10;
  } else {
    // MANUAL 모드
    waterFlow = waterOn ? +waterSlider.value : 0;
  }

  // 변화 로직
  let tempError = targetTemp - temp;
  temp += tempError*0.05 - fan*0.1 + (Math.random()-0.5)*0.3;
  
  let humError = targetHum - humidity;
  humidity += humError*0.05 + waterFlow*0.02 + (Math.random()-0.5)*0.3;

  co2 += (Math.random()-0.5)*10;

  // 경고
  if(temp>35) alert("🔥 온도 과열!");
  if(humidity<40) alert("💧 건조!");

  // 화면 표시
  tempEl.innerText=temp.toFixed(1);
  humEl.innerText=humidity.toFixed(1);
  co2El.innerText=co2.toFixed(0);

  bulb.innerText = light>50 ? "💡" : "🔌";

  waterText.innerText = waterFlow.toFixed(1) + " L/h";
  waterBtn.className = waterOn ? "on" : "off";
  waterBtn.innerText = waterOn ? "물 펌프 ON" : "물 펌프 OFF";
  fanText.innerText = fan;

  // 그래프
  if(labels.length>20){ labels.shift(); co2Data.shift(); humData.shift(); }
  labels.push('');
  co2Data.push(co2);
  humData.push(humidity);
  chart.update();

},2000);

</script>
</body>
</html>
